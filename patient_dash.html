<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient & Counselor Dashboards</title>
  <link rel="stylesheet" href="assets/css/globals.css">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/1.7.3/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="assets/js/globals.js"></script>
  <style>
    .modal {
      display: none;
    }

    .modal.active {
      display: flex;
    }

    .dashboard-navigation {
      flex-direction: column;
    }

    @media (min-width: 768px) {
      .dashboard-navigation {
        flex-direction: row;
      }
    }
  </style>
</head>

<body class="bg-gray-100 font-sans">
  <div class="container mx-auto mt-8 px-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <!-- Navigation -->
      <nav class="dashboard-navigation bg-white p-4 rounded-lg shadow md:col-span-1">
        <h1 class="text-xl font-bold mb-4">TrueGuidanceHub</h1>
        <button class="w-full py-2 text-left hover:bg-gray-200" onclick="showSection('appointments')">Your Appointments</button>
        <button class="w-full py-2 text-left hover:bg-gray-200" onclick="showSection('counseling-reports')">Counseling Reports</button>
        <button class="w-full py-2 text-left hover:bg-gray-200" onclick="showSection('payments')">Your Payments</button>
        <button class="w-full py-2 text-left hover:bg-gray-200" onclick="showSection('available-counselors')">Available Counselors</button>
        <button class="w-full py-2 text-left hover:bg-gray-200" onclick="showSection('user-profile')">User Profile</button>
      </nav>

      <!-- Content -->
      <div class="content-area bg-white p-4 rounded-lg shadow md:col-span-3">
        <header class="flex flex-wrap items-center justify-between mb-4">
          <h1 class="text-2xl font-bold">Welcome to Your Dashboard</h1>
          <div class="profile-dropdown relative">
            <button class="font-semibold">Profile</button>
            <div class="profile-dropdown-content absolute right-0 mt-2 bg-white shadow rounded hidden">
              <a href="#" class="block px-4 py-2 hover:bg-gray-100">Settings</a>
              <a href="#" class="block px-4 py-2 hover:bg-gray-100">Logout</a>
            </div>
          </div>
        </header>

        <section id="appointments" class="dashboard-section">
          <h2 class="text-lg font-bold mb-4">Your Appointments</h2>
          <div class="overflow-x-auto">
            <table class="table-auto w-full text-left border-collapse border border-gray-300">
              <thead>
                <tr class="bg-gray-100">
                  <th class="border p-2">Date</th>
                  <th class="border p-2">Time</th>
                  <th class="border p-2">Counselor/Doctor</th>
                  <th class="border p-2">Location</th>
                  <th class="border p-2">Status</th>
                  <th class="border p-2">Chat</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="border p-2">Feb 1</td>
                  <td class="border p-2">10:00 AM</td>
                  <td class="border p-2">Dr. Smith</td>
                  <td class="border p-2">Room 101</td>
                  <td class="border p-2">Confirmed</td>
                  <td class="border p-2"><button class="btn-primary" onclick="startChat('Dr. Smith')">Chat</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- Modal for Appointment -->
        <div id="appointmentModal" class="modal fixed top-0 left-0 w-full h-full flex items-center justify-center bg-black bg-opacity-50 hidden">
          <div class="modal-content bg-white p-4 rounded-lg shadow w-11/12 sm:max-w-lg">
            <h3 class="text-lg font-bold mb-4">Schedule New Appointment</h3>
            <form id="appointmentForm">
              <div>
                <label for="appointment-date" class="block text-sm font-medium mb-2">Date:</label>
                <input id="appointment-date" type="text" placeholder="Select a date" class="w-full px-3 py-2 border rounded-lg"/>
              </div>
              <div class="mt-4">
                <label for="appointment-time" class="block text-sm font-medium mb-2">Time:</label>
                <input id="appointment-time" type="time" class="w-full px-3 py-2 border rounded-lg"/>
              </div>
              <div class="mt-4 flex justify-end">
                <button type="button" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600" onclick="saveAppointment()">Save</button>
                <button type="button" class="px-4 py-2 bg-gray-500 text-white rounded ml-2 hover:bg-gray-600" onclick="closeAppointmentModal()">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // JavaScript remains the same as in your original code.
  </script>
</body>

</html>
